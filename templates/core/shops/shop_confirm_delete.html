{% extends 'base.html' %}

{% block title %}Дўконни ўчириш{% endblock %}
{% block page_title %}Дўконни ўчириш{% endblock %}

{% block content %}
<section class="panel form-panel">
  <h3>Дўконни ўчириш</h3>
  <p>"{{ object.name }}" дўконини ўчирмоқчимисиз?</p>
  <form method="post" class="form-actions">
    {% csrf_token %}
    <a href="{% url 'shop-list' %}" class="btn btn-light">Йўқ</a>
    <button type="submit" class="btn btn-danger">Ҳа, ўчириш</button>
  </form>
</section>
{% endblock %}
