{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruxsat yo'q</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-body">
  <section class="auth-card" style="max-width:560px;">
    <div class="auth-logo"><span class="material-symbols-outlined">lock</span></div>
    <h1>Ruxsat yo'q</h1>
    <p>Sizda ushbu sahifani ko'rish uchun ruxsat mavjud emas.</p>

    <div class="order-actions" style="margin-top:16px;">
      <button type="button" class="btn btn-light" onclick="window.history.back();">Ortga qaytish</button>
      <a class="btn btn-primary" href="{{ home_url }}">Bosh sahifaga o'tish</a>
      {% if request.user.is_authenticated %}
      <form method="post" action="{% url 'logout' %}" style="margin:0;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Tizimdan chiqish</button>
      </form>
      {% else %}
      <a class="btn btn-danger" href="{% url 'login' %}">Tizimdan chiqish</a>
      {% endif %}
    </div>
  </section>
</body>
</html>
